services:
  - type: web
    name: pre-med-server
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        value: https://premedelection.vercel.app
      - key: OCR_MAX_CONCURRENCY
        value: 2
      - key: LOG_LEVEL
        value: info
